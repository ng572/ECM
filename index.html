    <style>
        body, html { margin: 0; height: 100%; background: #000; }
        #terminal { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script>
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#1e1e1e' }
        });
        term.open(document.getElementById('terminal'));
        term.writeln("Initializing Termux-like Environment...");

        async function main() {
            // 1. Initialize Pyodide
            let pyodide = await loadPyodide();
            
            // 2. Load MicroPip (Required for installing packages) and more
            term.writeln("Loading Packages...");
            
            await pyodide.loadPackage("micropip");
            const micropip = pyodide.pyimport("micropip");
            
            await micropip.install('pycryptodome')
            await micropip.install('numpy')
            await micropip.install('hashlib')
            
            term.writeln("Environment Ready!\r\n");

            let inputBuffer = "";
            // 1. SET STDOUT & STDIN FIRST
            pyodide.setStdout({
                batched: (str) => term.writeln(str)
            });

import base64
from Crypto.Cipher import AES
from Crypto.Protocol.KDF import scrypt
from Crypto.Util.Padding import unpad

def decrypt_aes_256_scrypt(encoded_payload, password):
    # 1. Base64 decode the input string
    try:
        final_payload = base64.b64decode(encoded_payload)
    except Exception as e:
        return f"Error: Invalid Base64 input - {e}"

    # 2. Extract the salt and the ciphertext
    # Since we used a 16-byte salt in the encrypt function:
    salt = final_payload[:16]
    ciphertext = final_payload[16:]

    # 3. Re-derive the Key and IV using the EXACT same scrypt parameters
    password_bytes = password.encode('utf-8')
    key_iv = scrypt(password_bytes, salt, key_len=48, N=2**14, r=8, p=1)
    
    key = key_iv[:32]
    iv = key_iv[32:48]

    # 4. Setup Cipher for decryption
    cipher = AES.new(key, AES.MODE_CBC, iv)

    try:
        # 5. Decrypt and Unpad
        decrypted_padded = cipher.decrypt(ciphertext)
        plaintext = unpad(decrypted_padded, AES.block_size)
        
        # 6. Return as string
        return plaintext.decode('utf-8')
    except (ValueError, KeyError):
        return "Error: Decryption failed. Incorrect password or corrupted data."
