<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body, html { margin: 0; height: 100%; background: #000; }
        #terminal { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script>
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#1e1e1e' }
        });
        term.open(document.getElementById('terminal'));
        term.writeln("Initializing Termux-like Environment...");

        async function main() {
            // 1. Initialize Pyodide
            let pyodide = await loadPyodide();
            
            // 2. Load MicroPip (Required for installing packages) and more
            term.writeln("Loading Packages...");
            
            await pyodide.loadPackage("micropip");
            const micropip = pyodide.pyimport("micropip");
            
            await micropip.install('pycryptodome')
            
            term.writeln("Environment Ready!\r\n");

            let inputBuffer = "";
            // 1. SET STDOUT & STDIN FIRST
            pyodide.setStdout({
                batched: (str) => term.writeln(str)
            });
                        
            // 2. THEN RUN YOUR PYTHON CODE
            // --- ADD STARTUP PYTHON CODE HERE ---
            // This runs as soon as the terminal is ready
            const pycode = `
import base64
from Crypto.Cipher import AES
from Crypto.Protocol.KDF import scrypt
from Crypto.Util.Padding import unpad

def decrypt_aes_256_scrypt(encoded_payload, password):
    # 1. Base64 decode the input string
    try:
        final_payload = base64.b64decode(encoded_payload)
    except Exception as e:
        return f"Error: Invalid Base64 input - {e}"

    # 2. Extract the salt and the ciphertext
    # Since we used a 16-byte salt in the encrypt function:
    salt = final_payload[:16]
    ciphertext = final_payload[16:]

    # 3. Re-derive the Key and IV using the EXACT same scrypt parameters
    password_bytes = password.encode('utf-8')
    key_iv = scrypt(password_bytes, salt, key_len=48, N=2**14, r=8, p=1)
    
    key = key_iv[:32]
    iv = key_iv[32:48]

    # 4. Setup Cipher for decryption
    cipher = AES.new(key, AES.MODE_CBC, iv)

    try:
        # 5. Decrypt and Unpad
        decrypted_padded = cipher.decrypt(ciphertext)
        plaintext = unpad(decrypted_padded, AES.block_size)
        
        # 6. Return as string
        return plaintext.decode('utf-8')
    except (ValueError, KeyError):
        return "Error: Decryption failed. Incorrect password or corrupted data."

encoded_str = """
AGajqkQIB3hbDg8BOJbfe0M7hrCD1rmS/oj54m4KGh7DSuKRMoVHwk4oYnqNsfDB8xyMoRzoDvtLebDdNc/bYBgha8GXn5If9WfpeU5bytNMWHzRxajcMnLiSywyyFEhk7swT4I5OFESGN1zhFuyDO7Mu5TZ6fwWNgFMMGn2ZDn/HAlHva0u8VzgC58GsYmv6JQkvENriR+0s5BkM+6mktfhGunyxd9hZAn+xyHjojMC6DA/W/mw/BtGncrGenQYyGyxkqGYYInq9dGGJoVXjkpU7yWZ/s2MUOUNhr681YAxUsbuzBzzFhwgQkvRTc2lTdc65RLc3sRpPRDi4fECU2vCfqkX5gdye7o+61K9OYXJhMn/uoD+6TmuFaBc+uj7nVpJFwSNNRCfeTdR+z8DV3v4iuKqu/t3OfDE5Dd+DNV8+1V7Z2tK7JQUKhhmfBBEwQODjpula39HIQmTZoz27NSgXSZa2Q/c7FxJ/PIxdwxmqIJbiC5Kmn3LDO96oosyp1A3+Ez3do4C7Wt+uDj/U07caOQz0WasE833y1/e6I6gV9w+1xAuLAhHiGeXZyzF9W6+jJ8tAhl3d+zv0tnkqwlSpSBlMFTH6Jla+mhAidTjjWTsnPCncv7OeQIX7l1LMYg3nAOHsMeXRxb4NNwXsUO1IFA/taLA3wRvAtc5a7HRKknNYUGex8Rol4ODg8/b6Bc7BbCGGUniRaTCM8SHr7uEouQQFt2yhReViY7thhuYBOozmFDvqvkDmuk60J1j7auejSqHzoskoA+YQH3tUnsMxGK1z5W/du7W3mlA9VdaXX4wvFshQQ5BED88uhr98P1uqaQIxrnnfmI49Hg75/lbkaw58SN20Cf1vBhkZJyN+C5NM3ncIJdsz89uIOzd3pkJVnx67pIlAPw7IILJTckJy1iD1UnRGCHUTWVSXac02c7F6VWnLh5F17wONLHSwXT2nPUMzxbf12eWHXKqnMjuUh7cttKTVbksnWY1fjf8YkCEPjLKQpR1W94pUE8cFo5MbY59BYFG9IpWagIs1DrFz34rDU2TiXsTaKEa4Br5DDsXqoxwD0u+eby99tnGw4uT2ue0F46ovWs5booZ/Ewk7fLTdrn5cc8xT8JFDfTqcwTO2LMXo1eLoJ07cHWwo0Gvc6xmFUxMVm+oyfuR6JMy4jNNRIVax58MnyNmyLdfE6kgNdvI8yxi+MU8C5kTGtbvkwxDpm7nfG4JOzrUpMNijLOilIC0FWvwlEpJLs6OPBSBLNV+Ow3bOy5p53fYblyCY6Hm2KEye9uqwP4f6KQe+uYg3Jm0OZjyp8H30nkqgPbV4UFKnbTtgcwZHIFChdBHZycfRHxx5UwuhNhsC1d9xdJsQ16haz3J6itbRVAr6ZXFtzOO8++Hc9aVpkGR01pHrnyIma8VxH+LuZu8jPSRb6pRatoIK0vZpap8t5DPapw9ZuM9+zLoPPaOQHisHYpHOO1IjiK0UNMi4+8S1YQD4xgiygr8Y/xUXyisrWdclpbEDNhdqYc0iq7Ad7lN
"""

def custom_input(prompt="", dv=""):
    # Call the JS function and pass the prompt string directly
    return window.getPythonInput(prompt, dv)

    global code
    
    print("Please type in password: ", flush=True)
    await asyncio.sleep(0.1)
    password = custom_input("password", "")

            `
            await pyodide.runPythonAsync(pycode);
            // ------------------------------------

            term.onData(async (data) => {
                const code = data.charCodeAt(0);
                if (code === 13) { // Enter
                    term.write("\r\n");
                    try {
                        let result = await pyodide.runPythonAsync(inputBuffer);
                        if (result !== undefined) term.writeln(String(result));
                    } catch (err) {
                        term.writeln("\x1b[31m" + err.message + "\x1b[0m");
                    }
                    inputBuffer = "";
                    term.write(">>> ");
                } else if (code === 127) { // Backspace
                    if (inputBuffer.length > 0) {
                        inputBuffer = inputBuffer.slice(0, -1);
                        term.write("\b \b");
                    }
                } else {
                    inputBuffer += data;
                    term.write(data);
                }
            });

            term.write(">>> ");
        }
        // Add this to your global JS scope
        window.getPythonInput = function(promptText, dv) {
            return window.prompt(promptText || "Python Input Required", dv || "");
        };
        main();
    </script>
</body>
</html>
